<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kotak Pandora</title>
    
    <meta name="theme-color" content="#0f172a">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kotak Pandora">
    
    <!-- Manifest & Icon -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ===== LOADING OVERLAY ===== */
        #loading-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.6s ease;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #1e293b;
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loading-text {
            margin-top: 20px;
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .loading-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* ===== BANNER INSTALL PWA ===== */
        #pwa-install-banner {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 420px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 9999;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            transition: bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #pwa-install-banner.show {
            bottom: 24px;
        }
        .pwa-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .pwa-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
        }
        .pwa-text h4 {
            margin: 0 0 2px 0;
            font-size: 0.95rem;
            color: #f1f5f9;
            font-weight: 600;
        }
        .pwa-text p {
            margin: 0;
            font-size: 0.78rem;
            color: #94a3b8;
            line-height: 1.3;
        }
        .pwa-btn {
            background: #fbbf24;
            color: #0f172a;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .pwa-btn:hover {
            background: #fcd34d;
            transform: scale(1.02);
        }
        .pwa-close {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #334155;
            color: #94a3b8;
            border: none;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .pwa-close:hover {
            background: #475569;
            color: #e2e8f0;
        }
    </style>
</head>
<body>

    <!-- ===== LOADING ===== -->
    <div id="loading-overlay">
        <div class="loading-icon">📦</div>
        <div class="spinner"></div>
        <div class="loading-text">Membuka Kotak Pandora...</div>
    </div>

    <!-- ===== IFRAME KE GAS ===== -->
    <!-- GANTI DENGAN URL GAS ANDA -->
    <iframe src="https://script.google.com/macros/s/AKfycby.../exec" onload="hideLoading()"></iframe>

    <!-- ===== BANNER INSTALL PWA ===== -->
    <div id="pwa-install-banner">
        <button class="pwa-close" onclick="closeInstallBanner()">✕</button>
        <div class="pwa-info">
            <div class="pwa-icon">📦</div>
            <div class="pwa-text">
                <h4>Kotak Pandora</h4>
                <p id="pwa-desc">Install di layar utama untuk akses cepat & aman.</p>
            </div>
        </div>
        <button id="pwa-install-btn" class="pwa-btn">Install</button>
    </div>

    <script>
        // ===== HIDE LOADING =====
        function hideLoading() {
            var overlay = document.getElementById('loading-overlay');
            overlay.style.opacity = '0';
            setTimeout(function() {
                overlay.style.display = 'none';
            }, 500);
        }

        // ===== PWA INSTALL LOGIC =====
        let deferredPrompt;
        const installBanner = document.getElementById('pwa-install-banner');
        const installBtn = document.getElementById('pwa-install-btn');
        const pwaDesc = document.getElementById('pwa-desc');

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

        if (!isStandalone) {
            if (isIOS) {
                setTimeout(() => {
                    pwaDesc.innerHTML = 'Ketuk ikon <b>Share</b> lalu <b>Add to Home Screen</b>';
                    installBtn.style.display = 'none';
                    installBanner.classList.add('show');
                }, 2000);
            } else {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    installBanner.classList.add('show');
                });
            }
        }

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('✅ Aplikasi di-install');
                }
                deferredPrompt = null;
                closeInstallBanner();
            }
        });

        function closeInstallBanner() {
            installBanner.classList.remove('show');
        }

        window.addEventListener('appinstalled', () => {
            closeInstallBanner();
        });
    </script>
</body>
</html>
